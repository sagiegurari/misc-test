<md-content class="repo-grid">
    <md-card class="repo-card" ng-repeat="repository in repositories">
        <md-subheader class="md-primary">
            <a ng-href="[[repository.html_url]]" ng-bind="repository.name"></a>
        </md-subheader>
        <div class="repo-info">
            <p ng-bind="repository.description"></p>
        </div>
    </md-card>
</md-content>
