language: ruby
sudo: true
services:
  - docker
before_install:
  - docker pull wnameless/oracle-xe-11g
  - docker pull collinestes/docker-node-oracle
  - docker run -d -p 49160:22 -p 1521:1521 -e ORACLE_ALLOW_REMOTE=true wnameless/oracle-xe-11g
  - docker ps -a
  - docker cp ./test.sh | CONTAINER:/test
  - docker run collinestes/docker-node-oracle /bin/sh -c "cd /test; sh ./test.sh"
script:
  - docker ps -a
