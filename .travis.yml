language: rust
sudo: true
dist: trusty
group: edge
rust:
  - nightly
env:
  global:
    - RUST_BACKTRACE=1
script:
  - wget -O ~/.cargo/bin/cargo-make https://bintray.com/sagiegurari/cargo-make/download_file?file_path=cargo-make_v0.3.47
  - chmod 777 ~/.cargo/bin/cargo-make
  - cargo-make make ci-flow
